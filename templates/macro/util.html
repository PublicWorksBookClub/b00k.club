{% macro back(text="Back") %}
  <a
    href="../"
    class="inline-flex h-10 min-w-20 items-center justify-center mt-1 ml-1 border-2 border-gray-700 hover:bg-black/5"
  >
    {{ text }}
  </a>
{% endmacro %}

{% macro nav(href, text) %}
  <a
    href="{{ href }}"
    class="inline-flex h-10 min-w-20 px-4 items-center justify-center mt-1 ml-1 border-2 border-gray-700 hover:bg-black/5"
  >
    {{ text }}
  </a>
{% endmacro %}

{% macro search(text="Search") %}
  <button id="footer-search-trigger" aria-label="Search" aria-keyshortcuts="Meta+K Control+K"
          class="border-2! border-gray-700! h-10! md:min-w-20! px-4! items-center! justify-center! mt-1! ml-1! hover:bg-black/5 inline-flex! rounded-none! align-bottom">
    <svg viewBox="0 0 24 24" class="md:text-gray-700! text-gray-900"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="text-gray-600! hidden! md:inline!">{{ text }}</span>
    <span class="kbd text-gray-600! hidden! md:inline!">⌘K</span>
  </button>
{% endmacro %}
